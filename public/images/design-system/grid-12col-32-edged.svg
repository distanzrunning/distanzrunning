    <path fill="#E0EBEB" d="M32 0h60v312H32z"/>
    <!-- Column 2: x=32+60+16=108 -->
    <path fill="#E0EBEB" d="M108 0h60v312h-60z"/>
    <!-- Column 3: x=108+60+16=184 -->
    <path fill="#E0EBEB" d="M184 0h60v312h-60z"/>
    <!-- Column 4: x=184+60+16=260 -->
    <path fill="#E0EBEB" d="M260 0h60v312h-60z"/>
    <!-- Column 5: x=260+60+16=336 -->
    <path fill="#E0EBEB" d="M336 0h60v312h-60z"/>
    <!-- Column 6: x=336+60+16=412 -->
    <path fill="#E0EBEB" d="M412 0h60v312h-60z"/>
    <!-- Column 7: x=412+60+16=488 -->
    <path fill="#E0EBEB" d="M488 0h60v312h-60z"/>
    <!-- Column 8: x=488+60+16=564 -->
    <path fill="#E0EBEB" d="M564 0h60v312h-60z"/>
    <!-- Column 9: x=564+60+16=640 -->
    <path fill="#E0EBEB" d="M640 0h60v312h-60z"/>
    <!-- Column 10: x=640+60+16=716 -->
    <path fill="#E0EBEB" d="M716 0h60v312h-60z"/>
    <!-- Column 11: x=716+60+16=792 -->
    <path fill="#E0EBEB" d="M792 0h60v312h-60z"/>
    <!-- Column 12: x=792+60+16=868 -->
    <path fill="#E0EBEB" d="M868 0h60v312h-60z"/>

    <!-- Left gutter indicator (32px) -->
    <path d="M32 160h-1v-3H1v3H0v-8h1v4h30v-4h1v8z" fill="#0A1757"/>
    <text x="16" y="179" fill="#121212" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">32</text>

    <!-- Gap indicator (16px) - between columns 1 and 2 -->
    <path d="M108 160h-1v-3H93v3h-1v-8h1v4h14v-4h1v8z" fill="#0A1757"/>
    <text x="100" y="179" fill="#121212" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">16</text>

    <!-- Right gutter indicator (32px) -->
