<svg width="320" height="280" viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="280" fill="#F0F5F5"/>

  <!-- Title -->
  <text x="160" y="20" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11" font-weight="500">1 COLUMN - SMALL SCREEN (&lt;375px)</text>

  <!-- Left outside gutter -->
  <rect x="0" y="40" width="24" height="200" fill="#E8F0F0"/>

  <!-- Single column content area -->
  <rect x="24" y="40" width="272" height="200" fill="#E0EBEB"/>

  <!-- Content blocks stacked vertically -->
  <rect x="36" y="52" width="248" height="40" rx="4" fill="#FFFFFF" stroke="#B3B3B3" stroke-width="1"/>
  <text x="160" y="77" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11">Content block</text>

  <!-- Gap -->
  <line x1="284" y1="92" x2="284" y2="104" stroke="#E43C81" stroke-width="2"/>

  <rect x="36" y="104" width="248" height="40" rx="4" fill="#FFFFFF" stroke="#B3B3B3" stroke-width="1"/>
  <text x="160" y="129" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11">Content block</text>

  <!-- Gap -->
  <line x1="284" y1="144" x2="284" y2="156" stroke="#E43C81" stroke-width="2"/>

  <rect x="36" y="156" width="248" height="40" rx="4" fill="#FFFFFF" stroke="#B3B3B3" stroke-width="1"/>
  <text x="160" y="181" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11">Content block</text>

  <!-- Right outside gutter -->
  <rect x="296" y="40" width="24" height="200" fill="#E8F0F0"/>

  <!-- Gap dimension -->
  <line x1="296" y1="92" x2="296" y2="104" stroke="#0A1757" stroke-width="1"/>
  <line x1="292" y1="92" x2="300" y2="92" stroke="#0A1757" stroke-width="1"/>
  <line x1="292" y1="104" x2="300" y2="104" stroke="#0A1757" stroke-width="1"/>
  <text x="308" y="102" fill="#0A1757" font-family="system-ui, sans-serif" font-size="9" font-weight="500">12px</text>

  <!-- Outside gutter dimension -->
  <line x1="0" y1="252" x2="0" y2="264" stroke="#0A1757" stroke-width="1"/>
  <line x1="24" y1="252" x2="24" y2="264" stroke="#0A1757" stroke-width="1"/>
  <line x1="0" y1="258" x2="24" y2="258" stroke="#0A1757" stroke-width="1"/>
  <text x="12" y="276" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">24px</text>

  <!-- Full width label -->
  <text x="160" y="270" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10">Content stacks vertically</text>
</svg>
