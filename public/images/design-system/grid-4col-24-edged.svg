<svg xmlns="http://www.w3.org/2000/svg" width="336" height="312">
  <g fill="none" fill-rule="evenodd">
    <!-- Background -->
    <rect fill="#F0F5F5" width="336" height="312" rx="2"/>

    <!-- 4 columns (48px each, 24px gutters, 24px outside gutters) -->
    <!-- Total: 24 + 48 + 24 + 48 + 24 + 48 + 24 + 48 + 24 = 336 -->
    <!-- Column 1: x=24 -->
    <path fill="#E0EBEB" d="M24 0h48v312H24z"/>
    <!-- Column 2: x=24+48+24=96 -->
    <path fill="#E0EBEB" d="M96 0h48v312H96z"/>
    <!-- Column 3: x=96+48+24=168 -->
    <path fill="#E0EBEB" d="M168 0h48v312h-48z"/>
    <!-- Column 4: x=168+48+24=240 -->
    <path fill="#E0EBEB" d="M240 0h48v312h-48z"/>

    <!-- Left outside gutter indicator (24px) -->
    <path d="M24 160h-1v-3H1v3H0v-8h1v4h22v-4h1v8z" fill="#0A1757"/>
    <text x="12" y="179" fill="#121212" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">24</text>

    <!-- Gutter indicator (24px) - between columns 1 and 2 -->
    <path d="M96 160h-1v-3H73v3h-1v-8h1v4h22v-4h1v8z" fill="#0A1757"/>
    <text x="84" y="179" fill="#121212" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">24</text>

    <!-- Right outside gutter indicator (24px) -->
    <path d="M336 160h-1v-3h-22v3h-1v-8h1v4h22v-4h1v8z" fill="#0A1757"/>
    <text x="324" y="179" fill="#121212" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">24</text>
  </g>
</svg>
