<svg width="386" height="232" viewBox="0 0 386 232" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="386" height="232" fill="#F0F5F5"/>

  <!-- Title -->
  <text x="193" y="20" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11" font-weight="500">VERTICAL GAP</text>

  <!-- First element (Label) -->
  <rect x="40" y="40" width="306" height="36" rx="4" fill="#FFFFFF" stroke="#B3B3B3" stroke-width="1"/>
  <text x="56" y="63" fill="#333333" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Label</text>

  <!-- Gap indicator 1 -->
  <rect x="346" y="76" width="2" height="16" fill="#E43C81"/>
  <line x1="354" y1="76" x2="354" y2="92" stroke="#0A1757" stroke-width="1"/>
  <line x1="350" y1="76" x2="358" y2="76" stroke="#0A1757" stroke-width="1"/>
  <line x1="350" y1="92" x2="358" y2="92" stroke="#0A1757" stroke-width="1"/>

  <!-- Second element (Input) -->
  <rect x="40" y="92" width="306" height="36" rx="4" fill="#FFFFFF" stroke="#B3B3B3" stroke-width="1"/>
  <text x="56" y="115" fill="#999999" font-family="system-ui, sans-serif" font-size="13">Input field</text>

  <!-- Gap indicator 2 -->
  <rect x="346" y="128" width="2" height="16" fill="#E43C81"/>
  <line x1="354" y1="128" x2="354" y2="144" stroke="#0A1757" stroke-width="1"/>
  <line x1="350" y1="128" x2="358" y2="128" stroke="#0A1757" stroke-width="1"/>
  <line x1="350" y1="144" x2="358" y2="144" stroke="#0A1757" stroke-width="1"/>

  <!-- Third element (Button) -->
  <rect x="40" y="144" width="120" height="36" rx="4" fill="#E43C81"/>
  <text x="100" y="167" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Submit</text>

  <!-- Dimension labels -->
  <text x="370" y="88" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">gap</text>
  <text x="370" y="140" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">gap</text>

  <!-- Bottom note -->
  <text x="193" y="210" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11">12px (mobile) / 16px (desktop)</text>
</svg>
