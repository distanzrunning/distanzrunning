<svg width="375" height="280" viewBox="0 0 375 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="375" height="280" fill="#F0F5F5"/>

  <!-- Title -->
  <text x="187.5" y="24" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11" font-weight="500">4 COLUMNS - MOBILE (&lt;768px)</text>

  <!-- Left gutter -->
  <rect x="0" y="40" width="24" height="200" fill="#E8F0F0"/>

  <!-- Right gutter -->
  <rect x="351" y="40" width="24" height="200" fill="#E8F0F0"/>

  <!-- Column 1 -->
  <rect x="24" y="40" width="73" height="200" fill="#E0EBEB"/>

  <!-- Gap 1 -->
  <rect x="97" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 2 -->
  <rect x="113" y="40" width="73" height="200" fill="#E0EBEB"/>

  <!-- Gap 2 -->
  <rect x="186" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 3 -->
  <rect x="202" y="40" width="73" height="200" fill="#E0EBEB"/>

  <!-- Gap 3 -->
  <rect x="275" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 4 -->
  <rect x="291" y="40" width="60" height="200" fill="#E0EBEB"/>

  <!-- Column numbers -->
  <text x="60" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="12" font-weight="500">1</text>
  <text x="149" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="12" font-weight="500">2</text>
  <text x="238" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="12" font-weight="500">3</text>
  <text x="321" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="12" font-weight="500">4</text>

  <!-- Gutter dimension (left) -->
  <line x1="12" y1="248" x2="12" y2="260" stroke="#0A1757" stroke-width="1"/>
  <line x1="0" y1="254" x2="24" y2="254" stroke="#0A1757" stroke-width="1"/>
  <text x="12" y="272" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">24px</text>

  <!-- Gap dimension -->
  <line x1="97" y1="248" x2="97" y2="260" stroke="#0A1757" stroke-width="1"/>
  <line x1="113" y1="248" x2="113" y2="260" stroke="#0A1757" stroke-width="1"/>
  <line x1="97" y1="254" x2="113" y2="254" stroke="#0A1757" stroke-width="1"/>
  <text x="105" y="272" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">16px</text>
</svg>
