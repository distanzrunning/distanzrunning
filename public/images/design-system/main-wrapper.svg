<svg width="788" height="280" viewBox="0 0 788 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (viewport) -->
  <rect width="788" height="280" fill="#F0F5F5"/>

  <!-- Viewport label -->
  <text x="394" y="20" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11" font-weight="500">VIEWPORT</text>

  <!-- Left margin area -->
  <rect x="0" y="32" width="80" height="216" fill="#E8F0F0"/>

  <!-- Right margin area -->
  <rect x="708" y="32" width="80" height="216" fill="#E8F0F0"/>

  <!-- Main wrapper container (with borders) -->
  <rect x="80" y="32" width="628" height="216" fill="#FFFFFF" stroke="#B3B3B3" stroke-width="1"/>

  <!-- Left border highlight -->
  <rect x="80" y="32" width="1" height="216" fill="#B3B3B3"/>

  <!-- Right border highlight -->
  <rect x="707" y="32" width="1" height="216" fill="#B3B3B3"/>

  <!-- Content area inside -->
  <rect x="104" y="56" width="580" height="168" fill="#F7F7F7" stroke="#E5E5E5" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Content label -->
  <text x="394" y="144" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Page Content</text>

  <!-- Left margin dimension -->
  <line x1="40" y1="40" x2="40" y2="240" stroke="#0A1757" stroke-width="1"/>
  <line x1="32" y1="40" x2="48" y2="40" stroke="#0A1757" stroke-width="1"/>
  <line x1="32" y1="240" x2="48" y2="240" stroke="#0A1757" stroke-width="1"/>
  <text x="40" y="145" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500" transform="rotate(-90, 40, 145)">auto margin</text>

  <!-- Right margin dimension -->
  <line x1="748" y1="40" x2="748" y2="240" stroke="#0A1757" stroke-width="1"/>
  <line x1="740" y1="40" x2="756" y2="40" stroke="#0A1757" stroke-width="1"/>
  <line x1="740" y1="240" x2="756" y2="240" stroke="#0A1757" stroke-width="1"/>
  <text x="748" y="145" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500" transform="rotate(-90, 748, 145)">auto margin</text>

  <!-- Max-width dimension line -->
  <line x1="80" y1="264" x2="708" y2="264" stroke="#0A1757" stroke-width="1"/>
  <line x1="80" y1="256" x2="80" y2="272" stroke="#0A1757" stroke-width="1"/>
  <line x1="708" y1="256" x2="708" y2="272" stroke="#0A1757" stroke-width="1"/>
  <text x="394" y="274" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="11" font-weight="500">max-width: 1585px</text>

  <!-- Border labels -->
  <text x="85" y="145" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="9" font-weight="500" transform="rotate(-90, 85, 145)">border</text>
  <text x="703" y="145" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="9" font-weight="500" transform="rotate(-90, 703, 145)">border</text>

  <!-- Class labels -->
  <rect x="300" y="60" width="188" height="24" rx="4" fill="#0A1757"/>
  <text x="394" y="76" text-anchor="middle" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="11" font-weight="500">.main-wrapper</text>

  <rect x="300" y="92" width="188" height="24" rx="4" fill="#5C8F8F"/>
  <text x="394" y="108" text-anchor="middle" fill="#FFFFFF" font-family="ui-monospace, monospace" font-size="11" font-weight="500">.main-bordered</text>
</svg>
