<svg width="720" height="120" viewBox="0 0 720 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="720" height="120" fill="#F8F8F8"/>

  <!-- Raw Value Box -->
  <rect x="40" y="35" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="90" y="55" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="9">Raw value</text>
  <text x="90" y="72" text-anchor="middle" fill="#1A1A1A" font-family="ui-monospace, monospace" font-size="11" font-weight="500">#D11B5C</text>

  <!-- Arrow 1 -->
  <path d="M140 60 L160 60" stroke="#808080" stroke-width="2"/>
  <polygon points="160,56 170,60 160,64" fill="#808080"/>

  <!-- Global Token Box -->
  <rect x="170" y="35" width="120" height="50" rx="4" fill="#FFFFFF" stroke="#D11B5C" stroke-width="2"/>
  <text x="230" y="55" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="9">Global token</text>
  <text x="230" y="72" text-anchor="middle" fill="#D11B5C" font-family="ui-monospace, monospace" font-size="10" font-weight="500">electric-pink-55</text>

  <!-- Arrow 2 -->
  <path d="M290 60 L310 60" stroke="#808080" stroke-width="2"/>
  <polygon points="310,56 320,60 310,64" fill="#808080"/>

  <!-- Semantic Token Box -->
  <rect x="320" y="35" width="110" height="50" rx="4" fill="#FFFFFF" stroke="#5E3FD1" stroke-width="2"/>
  <text x="375" y="55" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="9">Semantic token</text>
  <text x="375" y="72" text-anchor="middle" fill="#5E3FD1" font-family="ui-monospace, monospace" font-size="10" font-weight="500">textAccent</text>

  <!-- Arrow 3 -->
  <path d="M430 60 L450 60" stroke="#808080" stroke-width="2"/>
  <polygon points="450,56 460,60 450,64" fill="#808080"/>

  <!-- Component Token Box -->
  <rect x="460" y="35" width="140" height="50" rx="4" fill="#FFFFFF" stroke="#008C47" stroke-width="2"/>
  <text x="530" y="55" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="9">Component token</text>
  <text x="530" y="72" text-anchor="middle" fill="#008C47" font-family="ui-monospace, monospace" font-size="10" font-weight="500">link-color-default</text>
</svg>
