<svg width="788" height="280" viewBox="0 0 788 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="788" height="280" fill="#F0F5F5"/>

  <!-- Title -->
  <text x="394" y="24" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="11" font-weight="500">12 COLUMNS - DESKTOP (768px+)</text>

  <!-- Left gutter -->
  <rect x="0" y="40" width="32" height="200" fill="#E8F0F0"/>

  <!-- Right gutter -->
  <rect x="756" y="40" width="32" height="200" fill="#E8F0F0"/>

  <!-- Calculate: 788 - 64 (gutters) = 724 content width -->
  <!-- 12 columns with 11 gaps of 16px = 176px gaps -->
  <!-- 724 - 176 = 548px for columns = ~45.67px per column -->

  <!-- Column 1 -->
  <rect x="32" y="40" width="46" height="200" fill="#E0EBEB"/>
  <!-- Gap -->
  <rect x="78" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 2 -->
  <rect x="94" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="140" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 3 -->
  <rect x="156" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="202" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 4 -->
  <rect x="218" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="264" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 5 -->
  <rect x="280" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="326" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 6 -->
  <rect x="342" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="388" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 7 -->
  <rect x="404" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="450" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 8 -->
  <rect x="466" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="512" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 9 -->
  <rect x="528" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="574" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 10 -->
  <rect x="590" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="636" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 11 -->
  <rect x="652" y="40" width="46" height="200" fill="#E0EBEB"/>
  <rect x="698" y="40" width="16" height="200" fill="#F0F5F5"/>

  <!-- Column 12 -->
  <rect x="714" y="40" width="42" height="200" fill="#E0EBEB"/>

  <!-- Column numbers (showing key columns) -->
  <text x="55" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">1</text>
  <text x="117" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">2</text>
  <text x="179" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">3</text>
  <text x="241" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">4</text>
  <text x="303" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">5</text>
  <text x="365" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">6</text>
  <text x="427" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">7</text>
  <text x="489" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">8</text>
  <text x="551" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">9</text>
  <text x="613" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">10</text>
  <text x="675" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">11</text>
  <text x="735" y="145" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="500">12</text>

  <!-- Gutter dimension (left) -->
  <line x1="16" y1="248" x2="16" y2="260" stroke="#0A1757" stroke-width="1"/>
  <line x1="0" y1="254" x2="32" y2="254" stroke="#0A1757" stroke-width="1"/>
  <text x="16" y="272" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">32px</text>

  <!-- Gap dimension -->
  <line x1="78" y1="248" x2="78" y2="260" stroke="#0A1757" stroke-width="1"/>
  <line x1="94" y1="248" x2="94" y2="260" stroke="#0A1757" stroke-width="1"/>
  <line x1="78" y1="254" x2="94" y2="254" stroke="#0A1757" stroke-width="1"/>
  <text x="86" y="272" text-anchor="middle" fill="#0A1757" font-family="system-ui, sans-serif" font-size="10" font-weight="500">16px</text>

  <!-- Divisions label -->
  <text x="394" y="268" text-anchor="middle" fill="#5C8F8F" font-family="system-ui, sans-serif" font-size="10" font-weight="400">Divides evenly into halves, thirds, quarters, and sixths</text>
</svg>
